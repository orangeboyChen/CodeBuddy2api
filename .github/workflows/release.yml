name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      owner: ${{ steps.owner.outputs.owner }}
      image: ghcr.io/${{ steps.owner.outputs.owner }}/codebuddy2api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "$latest_tag" ]]; then
            version="1.0.0"
          else
            current_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$current_version"

            if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
              echo "Latest tag '$latest_tag' is not in vX.Y.Z format." >&2
              exit 1
            fi

            version="${major}.${minor}.$((patch + 1))"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Determine lowercase owner
        id: owner
        shell: bash
        run: |
          set -euo pipefail

          lower_owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner=$lower_owner" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: Build ${{ matrix.arch }} image
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.arch }} image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload ${{ matrix.arch }} image digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create and push multi-architecture image tags
        shell: bash
        env:
          IMAGE_NAME: ${{ needs.prepare.outputs.image }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          digest_refs=()
          while IFS= read -r -d '' digest_file; do
            digest_refs+=("${IMAGE_NAME}@sha256:$(basename "$digest_file")")
          done < <(find /tmp/digests -type f -print0 | sort -z)

          if [[ "${#digest_refs[@]}" -ne 2 ]]; then
            echo "Expected 2 image digests, found ${#digest_refs[@]}." >&2
            exit 1
          fi

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${VERSION}" \
            --tag "${IMAGE_NAME}:latest" \
            "${digest_refs[@]}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "Docker image: \`$IMAGE_NAME\`"
